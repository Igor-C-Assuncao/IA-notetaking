name: Release AI Notetaker

on:
  push:
    tags:
      - 'v*' # Trigger the workflow when a tag starting with 'v' is pushed (e.g., v1.0.0)
  workflow_dispatch: # Allows you to run the build manually from the GitHub UI

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      # The tauri-action automatically builds the app and creates a GitHub Release
      - name: Build Tauri App and Create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # Automatically uses the version from tauri.conf.json
          releaseName: 'AI Notetaker v__VERSION__'
          releaseBody: 'Automated release generated by GitHub Actions. Download the installer below.'
          releaseDraft: true # Creates a draft release so you can review before publishing
          prerelease: false